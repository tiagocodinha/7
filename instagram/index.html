<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7IKS — Instagram</title>
    <meta http-equiv="refresh" content="2;url=https://www.instagram.com/7iks.nazare/">
    <link rel="icon" type="image/svg+xml" href="/7iks-favicon.svg">
    <link rel="icon" type="image/x-icon" href="/7iks-favicon.ico">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #faf8f5;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #1a1a1a;
        }
        .redirect-box {
            text-align: center;
            padding: 2rem;
        }
        .redirect-box img {
            width: 80px;
            margin-bottom: 1rem;
        }
        .redirect-box p {
            font-size: 1rem;
            color: #6b6560;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e0dcd7;
            border-top-color: #e63322;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="redirect-box">
        <img src="/7iks-logo-01.png" alt="7Iks">
        <p>A redirecionar para o Instagram...</p>
        <div class="spinner"></div>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = "https://www.instagram.com/7iks.nazare/";
        }, 2000);
    </script>
</body>
</html>
